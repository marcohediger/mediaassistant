## MediaAssistant + Immich — Combined stack for Synology NAS
##
## Usage:
##   1. Copy this file and .env.synology.example to your NAS
##   2. cp .env.synology.example .env
##   3. Edit .env with your paths and credentials
##   4. docker compose -f docker-compose.synology.yml up -d
##
## Web interfaces:
##   MediaAssistant: http://nas-ip:8000
##   Immich:         http://nas-ip:2283

name: mediaassistant-stack

services:
  # ─── MediaAssistant ────────────────────────────────────────
  mediaassistant:
    image: ghcr.io/marcohediger/mediaassistant:latest
    container_name: mediaassistant
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2.0
    ports:
      - "8000:8000"
    volumes:
      - mediaassistant-data:/app/data
      - ${INBOX_PATH}:/inbox
      - ${UPLOAD_LOCATION}:/library
    environment:
      - DATABASE_PATH=/app/data/mediaassistant.db
      - INBOX_PATH=/inbox
      - LIBRARY_PATH=/library
      - TZ=${TZ:-Europe/Zurich}
    depends_on:
      immich-server:
        condition: service_healthy

  # ─── Immich Server ─────────────────────────────────────────
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_DATABASE_NAME=${DB_DATABASE_NAME:-immich}
      - REDIS_HOSTNAME=redis
    ports:
      - "2283:2283"
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false

  # ─── Immich Machine Learning ───────────────────────────────
  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - model-cache:/cache
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_DATABASE_NAME=${DB_DATABASE_NAME:-immich}
      - REDIS_HOSTNAME=redis
    restart: always
    healthcheck:
      disable: false

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:3eeb09785cd61ec8e3be35f8804c8892080f3ca21934d628abc24ee4ed1698f6
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  # ─── PostgreSQL ────────────────────────────────────────────
  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION:-immich-db}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false

volumes:
  mediaassistant-data:
  model-cache:
  immich-db:
