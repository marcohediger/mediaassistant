services:
  mediaassistant:
    build:
      context: ./backend
    container_name: mediaassistant-dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./test_inbox:/inbox
      - ./test_library:/library
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/mediaassistant.db
      - INBOX_PATH=/inbox
      - LIBRARY_PATH=/library
      - LOG_LEVEL=DEBUG
      - TZ=Europe/Zurich
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
