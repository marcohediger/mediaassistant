{% extends "base.html" %}
{% block title %}Setup — Fertig{% endblock %}
{% block content %}
<div class="setup-container">
    <div class="setup-progress">
        <span class="step done">1. KI Backend</span>
        <span class="step done">2. SMTP</span>
        <span class="step done">3. Pfade</span>
        <span class="step active">4. Fertig</span>
    </div>

    <h1>Setup abgeschlossen!</h1>
    <p>MediaAssistant ist bereit. Alle Einstellungen können später im Menü unter "Einstellungen" angepasst werden.</p>

    <form method="post" action="/setup/step/4">
        <div class="form-actions">
            <a href="/setup/step/3" class="btn btn-secondary">Zurück</a>
            <button type="submit" class="btn btn-primary">Zum Dashboard</button>
        </div>
    </form>
</div>
{% endblock %}
