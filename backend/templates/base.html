<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MediaAssistant{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css?v=3">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <img src="/static/img/logo_dark.svg" alt="MediaAssistant" class="nav-logo">
        </a>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/duplicates">Duplikate</a>
            <a href="/logs">Logs</a>
            <a href="/settings">Einstellungen</a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/js/app.js"></script>
</body>
</html>
