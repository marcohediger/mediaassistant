services:
  mediaassistant:
    image: ghcr.io/marcohediger/mediaassistant:latest
    container_name: mediaassistant
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2.0
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ${INBOX_PATH:-./inbox}:/inbox
      - ${LIBRARY_PATH:-./library}:/library
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/mediaassistant.db
      - INBOX_PATH=/inbox
      - LIBRARY_PATH=/library
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-Europe/Zurich}
