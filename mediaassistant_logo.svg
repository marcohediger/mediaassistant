  <!-- Dark bg strip for preview -->
  <rect x="-10" y="185" width="660" height="120" fill="#111827" rx="8"/>

  <!-- Icon square -->
  <rect x="0" y="192" width="88" height="88" rx="20" fill="#1e1b4b" stroke="#818CF8" stroke-width="1" opacity="0.5"/>

