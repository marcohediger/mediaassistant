  <!-- Wordmark -->
  <text x="122" y="240" font-family="system-ui, sans-serif" font-size="38" font-weight="600" fill="#f3f4f6" letter-spacing="-1.2">Media</text>
  <text x="122" y="276" font-family="system-ui, sans-serif" font-size="38" font-weight="400" fill="#818CF8" letter-spacing="-0.8">Assistant</text>

