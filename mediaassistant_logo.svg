  <line x1="31" y1="48" x2="31" y2="45" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="39" y1="51" x2="41" y2="49" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="42" y1="58" x2="45" y2="58" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="51" x2="21" y2="49" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="58" x2="17" y2="58" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>

